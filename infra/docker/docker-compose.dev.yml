services:
  pricing-api:
    image: rust:1.85-slim-bookworm
    working_dir: /app
    volumes:
      - ../..:/app
    command: >
      sh -c "apt-get update && apt-get install -y pkg-config libssl-dev && 
             cargo run --release -p pricing-api"
    ports:
      - "3000:3000"
    environment:
      RUST_LOG: debug

  web:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ../../web:/app
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
