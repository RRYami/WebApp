services:
  pricing-api:
    image: rust:1.78-slim-bookworm
    working_dir: /app
    volumes:
      - ../..:/app
    command: >
      sh -c "apt-get update && apt-get install -y pkg-config libssl-dev && 
             cargo run --release -p pricing-api"
    ports:
      - "3000:3000"
    environment:
      RUST_LOG: debug

  data-ingestion:
    image: python:3.12-slim-bookworm
    working_dir: /app
    volumes:
      - ../../services/data-ingestion:/app
    command: >
      sh -c "pip install -e . && python -m ingestion.scheduler"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@timescaledb:5432/${POSTGRES_DB:-pricing}
      FRED_API_KEY: ${FRED_API_KEY:-}
      DATABENTO_API_KEY: ${DATABENTO_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  web:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ../../web:/app
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
