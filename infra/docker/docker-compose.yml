services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    command: >
      postgres
      -c max_locks_per_transaction=256
      -c max_pred_locks_per_transaction=128
      -c shared_buffers=256MB
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-pricing}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pricing-api:
    build:
      context: ../..
      dockerfile: services/pricing-api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      RUST_LOG: info
    depends_on:
      timescaledb:
        condition: service_healthy

  data-ingestion:
    build:
      context: ../../services/data-ingestion
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@timescaledb:5432/${POSTGRES_DB:-pricing}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      timescaledb:
        condition: service_healthy

  web:
    build:
      context: ../../web
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - pricing-api

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@localhost.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  timescale_data:
